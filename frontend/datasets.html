<!DOCTYPE html>
<html lang="en">
<head>
    <title>Datasets | AI Dataset Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">AI Dataset Manager</span>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">Create New Dataset</div>
                    <div class="card-body">
                        <input id="name" class="form-control mb-3" placeholder="Dataset Name">
                        <input id="description" class="form-control mb-3" placeholder="Description">
                        <input id="created_by" class="form-control mb-3" type="number" placeholder="User ID (e.g., 1)">
                        
                        <label class="form-label fw-bold text-muted small">Upload Dataset File</label>
                        <input id="dataset_file" type="file" class="form-control mb-3">

                        <button onclick="createDataset()" class="btn btn-primary w-100">Upload & Create</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Existing Datasets</div>
                    <ul id="dataset-list" class="list-group list-group-flush">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function createDataset() {
            const name = document.getElementById("name").value;
            const description = document.getElementById("description").value;
            const created_by = document.getElementById("created_by").value;
            const fileInput = document.getElementById("dataset_file").files[0];

            if (!name || !created_by || !fileInput) {
                alert("Dataset Name, User ID, and a File are required.");
                return;
            }

            const formData = new FormData();
            formData.append("name", name);
            formData.append("description", description);
            formData.append("created_by", created_by);
            formData.append("file", fileInput);

            try {
                const response = await fetch("/datasets/create", { method: "POST", body: formData });
                const result = await response.json();

                if (response.ok) {
                    alert("Success: " + result.message);
                    document.getElementById("name").value = '';
                    document.getElementById("description").value = '';
                    document.getElementById("created_by").value = '';
                    document.getElementById("dataset_file").value = '';
                    loadDatasets(); 
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        async function loadDatasets() {
            try {
                const res = await fetch("/datasets/");
                const datasets = await res.json();
                const list = document.getElementById("dataset-list");
                list.innerHTML = ""; 
                
                if (datasets.length === 0) {
                    list.innerHTML = "<li class='list-group-item text-muted'>No datasets found.</li>";
                    return;
                }

                datasets.forEach(d => {
                    const li = document.createElement("li");
                    li.className = "list-group-item";
                    const fileName = d.storage_path ? d.storage_path : "No file attached";

                    li.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <strong>${d.dataset_name}</strong><br>
                                <small class="text-muted">${d.description}</small><br>
                                <span class="badge bg-light text-dark border mt-1">📄 ${fileName}</span>
                            </div>
                            <span class="badge bg-success rounded-pill mt-1">Version: ${d.version_number || 1}</span>
                        </div>
                        <div class="d-flex gap-2 mt-3 flex-wrap">
                            <input type="file" id="update_file_${d.dataset_id}" style="display: none;" onchange="submitNewVersion(${d.dataset_id})">
                            <button onclick="document.getElementById('update_file_${d.dataset_id}').click()" class="btn btn-sm btn-outline-success">Upload New Version</button>
                            
                            <button onclick="promptLogChange(${d.version_id})" class="btn btn-sm btn-outline-primary">Manual Log</button>
                            <button onclick="viewHistory(${d.dataset_id})" class="btn btn-sm btn-outline-secondary">View History</button>
                            <button onclick="deleteDataset(${d.dataset_id})" class="btn btn-sm btn-danger ms-auto">Delete</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error("Error fetching datasets:", error);
            }
        }

        async function submitNewVersion(dataset_id) {
            const fileInput = document.getElementById(`update_file_${dataset_id}`).files[0];
            if (!fileInput) return;

            const userId = prompt("Enter your User ID to authenticate this upload (e.g., 1):");
            if (!userId) return;

            const formData = new FormData();
            formData.append("file", fileInput);
            formData.append("user_id", userId);

            try {
                const response = await fetch(`/datasets/upload_version/${dataset_id}`, { method: "POST", body: formData });
                const result = await response.json();
                
                if (response.status === 200) {
                    alert("🛑 " + result.message);
                } else if (response.ok) {
                    alert("✅ " + result.message);
                    loadDatasets(); 
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        async function promptLogChange(version_id) {
            const userId = prompt("Enter your User ID to log this change:");
            if (!userId) return; 
            const description = prompt("What did you change? (e.g., 'Removed empty rows')");
            if (!description) return; 

            try {
                const response = await fetch("/datasets/log_change", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ version_id: version_id, user_id: userId, description: description })
                });
                const result = await response.json();
                if (response.ok) alert("Success: " + result.message);
                else alert("Error.");
            } catch (error) {}
        }

        async function viewHistory(dataset_id) {
            try {
                const response = await fetch(`/datasets/history/${dataset_id}`);
                const history = await response.json();
                if (history.length === 0) {
                    alert("No changes have been logged yet.");
                    return;
                }
                let message = "📖 DATASET CHANGE HISTORY 📖\n\n";
                history.forEach(h => {
                    const date = new Date(h.change_date).toLocaleString();
                    message += `[v${h.version_number}] - ${date}\nUser: ${h.user_name}\nChange: ${h.change_description}\n\n`;
                });
                alert(message);
            } catch (error) {}
        }

        async function deleteDataset(dataset_id) {
            const confirmDelete = confirm("⚠️ Are you sure you want to completely delete this dataset? This will permanently erase all physical files, version history, and tied experiments.");
            if (!confirmDelete) return;

            try {
                const response = await fetch(`/datasets/delete/${dataset_id}`, { method: "DELETE" });
                const result = await response.json();
                if (response.ok) {
                    alert("✅ " + result.message);
                    loadDatasets();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        loadDatasets();
    </script>
</body>
</html>
