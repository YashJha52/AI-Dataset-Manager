<!DOCTYPE html>
<html lang="en">

<head>
    <title>Datasets | AI Dataset Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.6);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a 40%, #020617);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a5b4fc, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Premium Glass Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            color: var(--text-main);
        }

        .card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(30, 41, 59, 0.75);
        }

        .card-header {
            background: rgba(255, 255, 255, 0.03) !important;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-main) !important;
            padding: 1.25rem 1.5rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .card-body {
            padding: 2rem;
        }

        .card-title {
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
        }

        /* Forms & Inputs */
        .form-control {
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: var(--primary-color);
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        /* Buttons Update */
        .btn {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            transition: all 0.3s ease;
            letter-spacing: 0.025em;
            text-transform: none;
        }

        .btn-primary,
        .btn-info,
        .btn-success,
        .btn-warning {
            background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
            border: none;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover,
        .btn-info:hover,
        .btn-success:hover,
        .btn-warning:hover {
            background: linear-gradient(135deg, var(--primary-hover) 0%, var(--primary-color) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px -2px rgba(99, 102, 241, 0.5);
            color: white !important;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            border: none;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px -2px rgba(239, 68, 68, 0.5);
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .btn-outline-primary,
        .btn-outline-success,
        .btn-outline-secondary {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }

        .btn-outline-primary:hover,
        .btn-outline-success:hover,
        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Generic Background color overrides */
        .bg-primary,
        .bg-secondary,
        .bg-success,
        .bg-warning,
        .bg-info,
        .bg-dark {
            background: rgba(255, 255, 255, 0.03) !important;
        }

        .fw-bold {
            font-weight: 600 !important;
        }

        .text-dark {
            color: var(--text-main) !important;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .list-group-item {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-main);
            padding: 1.25rem 1.5rem;
            transition: background 0.2s;
        }

        .list-group-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            font-weight: 500;
            padding: 0.4em 0.8em;
            border-radius: 6px;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .badge.bg-light {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: var(--text-main) !important;
            border-color: transparent !important;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .col-md-4:nth-child(1) .card {
            animation-delay: 0.05s;
        }

        .col-md-4:nth-child(2) .card {
            animation-delay: 0.15s;
        }

        .col-md-4:nth-child(3) .card {
            animation-delay: 0.25s;
        }

        .col-md-4:nth-child(4) .card {
            animation-delay: 0.35s;
        }

        .col-md-5 .card {
            animation-delay: 0.1s;
        }

        .col-md-7 .card {
            animation-delay: 0.2s;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">AI Dataset Manager</span>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">Create New Dataset</div>
                    <div class="card-body">
                        <input id="name" class="form-control mb-3" placeholder="Dataset Name">
                        <input id="description" class="form-control mb-3" placeholder="Description">
                        <input id="created_by" class="form-control mb-3" type="number" placeholder="User ID (e.g., 1)">

                        <label class="form-label fw-bold text-muted small">Upload Dataset File</label>
                        <input id="dataset_file" type="file" class="form-control mb-3">

                        <button onclick="createDataset()" class="btn btn-primary w-100">Upload & Create</button>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Existing Datasets</div>
                    <ul id="dataset-list" class="list-group list-group-flush">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function createDataset() {
            const name = document.getElementById("name").value;
            const description = document.getElementById("description").value;
            const created_by = document.getElementById("created_by").value;
            const fileInput = document.getElementById("dataset_file").files[0];

            if (!name || !created_by || !fileInput) {
                alert("Dataset Name, User ID, and a File are required.");
                return;
            }

            const formData = new FormData();
            formData.append("name", name);
            formData.append("description", description);
            formData.append("created_by", created_by);
            formData.append("file", fileInput);

            try {
                const response = await fetch("/datasets/create", { method: "POST", body: formData });
                const result = await response.json();

                if (response.ok) {
                    alert("Success: " + result.message);
                    document.getElementById("name").value = '';
                    document.getElementById("description").value = '';
                    document.getElementById("created_by").value = '';
                    document.getElementById("dataset_file").value = '';
                    loadDatasets();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        async function loadDatasets() {
            try {
                const res = await fetch("/datasets/");
                const datasets = await res.json();
                const list = document.getElementById("dataset-list");
                list.innerHTML = "";

                if (datasets.length === 0) {
                    list.innerHTML = "<li class='list-group-item text-muted'>No datasets found.</li>";
                    return;
                }

                datasets.forEach(d => {
                    const li = document.createElement("li");
                    li.className = "list-group-item";
                    const fileName = d.storage_path ? d.storage_path : "No file attached";

                    li.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <strong>${d.dataset_name}</strong><br>
                                <small class="text-muted">${d.description}</small><br>
                                <span class="badge bg-light text-dark border mt-1">📄 ${fileName}</span>
                            </div>
                            <span class="badge bg-success rounded-pill mt-1">Version: ${d.version_number || 1}</span>
                        </div>
                        <div class="d-flex gap-2 mt-3 flex-wrap">
                            <input type="file" id="update_file_${d.dataset_id}" style="display: none;" onchange="submitNewVersion(${d.dataset_id})">
                            <button onclick="document.getElementById('update_file_${d.dataset_id}').click()" class="btn btn-sm btn-outline-success">Upload New Version</button>
                            
                            <button onclick="promptLogChange(${d.version_id})" class="btn btn-sm btn-outline-primary">Manual Log</button>
                            <button onclick="viewHistory(${d.dataset_id})" class="btn btn-sm btn-outline-secondary">View History</button>
                            <button onclick="deleteDataset(${d.dataset_id})" class="btn btn-sm btn-danger ms-auto">Delete</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error("Error fetching datasets:", error);
            }
        }

        async function submitNewVersion(dataset_id) {
            const fileInput = document.getElementById(`update_file_${dataset_id}`).files[0];
            if (!fileInput) return;

            const userId = prompt("Enter your User ID to authenticate this upload (e.g., 1):");
            if (!userId) return;

            const formData = new FormData();
            formData.append("file", fileInput);
            formData.append("user_id", userId);

            try {
                const response = await fetch(`/datasets/upload_version/${dataset_id}`, { method: "POST", body: formData });
                const result = await response.json();

                if (response.status === 200) {
                    alert("🛑 " + result.message);
                } else if (response.ok) {
                    alert("✅ " + result.message);
                    loadDatasets();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        async function promptLogChange(version_id) {
            const userId = prompt("Enter your User ID to log this change:");
            if (!userId) return;
            const description = prompt("What did you change? (e.g., 'Removed empty rows')");
            if (!description) return;

            try {
                const response = await fetch("/datasets/log_change", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ version_id: version_id, user_id: userId, description: description })
                });
                const result = await response.json();
                if (response.ok) alert("Success: " + result.message);
                else alert("Error.");
            } catch (error) { }
        }

        async function viewHistory(dataset_id) {
            try {
                const response = await fetch(`/datasets/history/${dataset_id}`);
                const history = await response.json();
                if (history.length === 0) {
                    alert("No changes have been logged yet.");
                    return;
                }
                let message = "📖 DATASET CHANGE HISTORY 📖\n\n";
                history.forEach(h => {
                    const date = new Date(h.change_date).toLocaleString();
                    message += `[v${h.version_number}] - ${date}\nUser: ${h.user_name}\nChange: ${h.change_description}\n\n`;
                });
                alert(message);
            } catch (error) { }
        }

        async function deleteDataset(dataset_id) {
            const confirmDelete = confirm("⚠️ Are you sure you want to completely delete this dataset? This will permanently erase all physical files, version history, and tied experiments.");
            if (!confirmDelete) return;

            try {
                const response = await fetch(`/datasets/delete/${dataset_id}`, { method: "DELETE" });
                const result = await response.json();
                if (response.ok) {
                    alert("✅ " + result.message);
                    loadDatasets();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Network error.");
            }
        }

        loadDatasets();
    </script>
</body>

</html>
