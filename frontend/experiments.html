<!DOCTYPE html>
<html lang="en">
<head>
    <title>Experiments | AI Dataset Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">AI Dataset Manager</span>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-success text-white">Log Experiment</div>
                    <div class="card-body">
                        <input id="model_id" class="form-control mb-3" type="number" placeholder="Model ID (e.g., 1)">
                        <input id="version_id" class="form-control mb-3" type="number" placeholder="Version ID (e.g., 1)">
                        <input id="accuracy" class="form-control mb-3" type="number" step="0.01" placeholder="Accuracy (e.g., 0.95)">
                        <input id="loss" class="form-control mb-3" type="number" step="0.01" placeholder="Loss (e.g., 0.05)">
                        <button onclick="runExperiment()" class="btn btn-success w-100">Submit Results</button>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Experiment History</div>
                    <ul id="experiment-list" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function runExperiment() {
        const model_id = document.getElementById("model_id").value;
        const version_id = document.getElementById("version_id").value;
        const accuracy = document.getElementById("accuracy").value;
        const loss = document.getElementById("loss").value;

        if (!model_id || !version_id) {
            alert("Model ID and Version ID are required.");
            return;
        }

        try {
            const response = await fetch("/experiments/run", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model_id, version_id, accuracy, loss })
            });

            if (response.ok) {
                alert("Success: Experiment logged to SQL!");
                loadExperiments(); // Refresh visual list
            } else {
                alert("Error: Could not save experiment. Make sure the Model ID and Version ID actually exist in your database first.");
            }
        } catch (error) {
            alert("Network error: Make sure your Flask server is running.");
        }
    }

    // Keep your existing loadExperiments() function here...
</script>
</body>
</html>
