<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Models | AI Dataset Manager</title>
    <meta name="description" content="Register and manage AI model algorithms for experiment tracking.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --primary-color: #6366f1; --primary-hover: #818cf8;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: rgba(255,255,255,0.1); --glass-bg: rgba(30,41,59,0.6);
        }
        * { box-sizing: border-box; }
        body { background: radial-gradient(ellipse at 70% 0%, #1e1b4b 0%, #0f172a 40%, #020617 100%); background-attachment: fixed; color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
        .navbar { background: rgba(15,23,42,0.5) !important; backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 1.1rem 0; }
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #a5b4fc, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-back { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: var(--text-main); border-radius: 10px; padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 16px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); overflow: hidden; color: var(--text-main); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        .col-md-5 .card { animation-delay: 0.05s; }
        .col-md-7 .card { animation-delay: 0.15s; }
        .card-header { background: rgba(255,255,255,0.03) !important; border-bottom: 1px solid var(--border-color); font-weight: 600; color: var(--text-main) !important; padding: 1.1rem 1.5rem; letter-spacing: 0.5px; text-transform: uppercase; font-size: 0.82rem; display: flex; align-items: center; justify-content: space-between; }
        .card-body { padding: 1.75rem; }

        .form-control { background-color: rgba(15,23,42,0.5); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 10px; padding: 0.7rem 1rem; transition: all 0.2s; }
        .form-control:focus { background-color: rgba(15,23,42,0.8); border-color: var(--primary-color); color: var(--text-main); box-shadow: 0 0 0 3px rgba(99,102,241,0.25); outline: none; }
        .form-control::placeholder { color: rgba(148,163,184,0.6); }
        .form-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .btn-save { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border: none; color: white; border-radius: 10px; font-weight: 600; padding: 0.7rem 1.2rem; transition: all 0.3s; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-save:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 15px -2px rgba(245,158,11,0.5); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Model Cards Grid */
        .model-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
        .model-item { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
        .model-item:last-child { border-bottom: none; }
        .model-item:hover { background: rgba(255,255,255,0.02); }
        .model-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.15rem; }
        .model-algo { display: inline-flex; align-items: center; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fde68a; padding: 0.2rem 0.65rem; border-radius: 100px; font-size: 0.73rem; font-weight: 600; }
        .model-id { font-size: 0.73rem; color: var(--text-muted); }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-state p { font-size: 0.88rem; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast-msg { padding: 0.85rem 1.25rem; border-radius: 12px; font-size: 0.88rem; font-weight: 500; color: #fff; backdrop-filter: blur(12px); animation: slideIn 0.3s ease; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .toast-msg.success { background: rgba(34,197,94,0.85);  border: 1px solid rgba(34,197,94,0.4); }
        .toast-msg.error   { background: rgba(239,68,68,0.85);  border: 1px solid rgba(239,68,68,0.4); }
        .toast-msg.info    { background: rgba(99,102,241,0.85); border: 1px solid rgba(99,102,241,0.4); }

        @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes spin    { to{transform:rotate(360deg)} }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1">⚡ AI Dataset Manager</span>
        <a href="dashboard.html" class="btn-back">← Dashboard</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card">
                <div class="card-header">🤖 Register New Model</div>
                <div class="card-body">
                    <label class="form-label">Model Name</label>
                    <input id="model_name" class="form-control mb-3" placeholder="e.g. ResNet50_Baseline">
                    <label class="form-label">Algorithm / Architecture</label>
                    <input id="algorithm" class="form-control mb-4" placeholder="e.g. CNN, RandomForest, Transformer">
                    <button id="save-btn" onclick="createModel()" class="btn-save">
                        <span id="save-text">💾 Save Model</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card">
                <div class="card-header">
                    <span>Available Models</span>
                    <span id="model-count" style="font-size:0.75rem;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#fde68a;padding:0.2rem 0.65rem;border-radius:100px;text-transform:none;letter-spacing:0;">0 models</span>
                </div>
                <div id="model-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script>
    function showToast(message, type = 'info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast-msg ${type}`;
        t.textContent = message;
        c.appendChild(t);
        setTimeout(() => { t.style.cssText = 'opacity:0;transform:translateX(30px);transition:all 0.3s;'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    async function createModel() {
        const model_name = document.getElementById('model_name').value.trim();
        const algorithm  = document.getElementById('algorithm').value.trim();
        if (!model_name || !algorithm) { showToast('Both Model Name and Algorithm are required.', 'error'); return; }

        const btn = document.getElementById('save-btn');
        const txt = document.getElementById('save-text');
        btn.disabled = true;
        txt.innerHTML = '<span class="spinner"></span> Saving...';

        try {
            const res    = await fetch('/models/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model_name, algorithm }) });
            const result = await res.json();
            if (res.ok) {
                showToast('✅ Model saved!', 'success');
                document.getElementById('model_name').value = '';
                document.getElementById('algorithm').value  = '';
                loadModels();
            } else {
                showToast('❌ ' + (result.error || 'Failed to save model.'), 'error');
            }
        } catch { showToast('Network error — is the server running?', 'error'); }
        finally { btn.disabled = false; txt.innerHTML = '💾 Save Model'; }
    }

    async function loadModels() {
        const list = document.getElementById('model-list');
        list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Loading models...</p></div>';
        try {
            const res    = await fetch('/models/');
            const models = await res.json();
            document.getElementById('model-count').textContent = `${models.length} model${models.length !== 1 ? 's' : ''}`;
            if (models.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">🤖</div><p>No models registered yet.</p></div>';
                return;
            }
            list.innerHTML = '';
            models.forEach(m => {
                const div = document.createElement('div');
                div.className = 'model-item';
                div.innerHTML = `
                    <div>
                        <div class="model-name">${escHtml(m.model_name)}</div>
                        <div class="mt-1"><span class="model-algo">${escHtml(m.algorithm)}</span></div>
                    </div>
                    <div class="model-id">ID: ${m.model_id}</div>`;
                list.appendChild(div);
            });
        } catch { list.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Failed to load models.</p></div>'; }
    }

    function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ─── Boot: restore session if exists ─────────────────────────────────────────
    (function init() {
        const raw = sessionStorage.getItem('ai_dm_user');
        if (raw) {
            try {
                const user = JSON.parse(raw);
                console.log('Models sync: session found for', user.name);
            } catch {
                sessionStorage.removeItem('ai_dm_user');
            }
        }
    })();
    loadModels();
</script>
</body>
</html>
