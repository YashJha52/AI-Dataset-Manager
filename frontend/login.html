<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User | AI Dataset Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-color:#0f172a;--primary-color:#6366f1;--text-main:#f8fafc;--text-muted:#94a3b8;--border-color:rgba(255,255,255,0.1);--glass-bg:rgba(30,41,59,0.6); }
        *{box-sizing:border-box;}
        body{background:radial-gradient(ellipse at 70% 0%,#1e1b4b 0%,#0f172a 40%,#020617 100%);background-attachment:fixed;color:var(--text-main);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
        .navbar{background:rgba(15,23,42,0.5)!important;backdrop-filter:blur(12px);border-bottom:1px solid var(--border-color);padding:1.1rem 0;}
        .navbar-brand{font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#a5b4fc,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .btn-back{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--text-main);border-radius:10px;padding:0.45rem 1rem;font-size:0.85rem;font-weight:500;transition:all 0.2s;text-decoration:none;}
        .btn-back:hover{background:rgba(255,255,255,0.12);color:#fff;}
        .register-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
        .register-card{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-color);border-radius:24px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,0.4);animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;}
        .register-icon{font-size:2.5rem;text-align:center;margin-bottom:0.5rem;}
        .register-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;text-align:center;margin-bottom:0.3rem;}
        .register-subtitle{font-size:0.85rem;color:var(--text-muted);text-align:center;margin-bottom:2rem;}
        .form-control{background-color:rgba(15,23,42,0.5);border:1px solid var(--border-color);color:var(--text-main);border-radius:12px;padding:0.8rem 1rem;transition:all 0.2s;}
        .form-control:focus{background-color:rgba(15,23,42,0.8);border-color:var(--primary-color);color:var(--text-main);box-shadow:0 0 0 3px rgba(99,102,241,0.25);outline:none;}
        .form-control::placeholder{color:rgba(148,163,184,0.6);}
        .form-label{font-size:0.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}

        /* Role Selector */
        .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.25rem;}
        .role-option{position:relative;}
        .role-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0;}
        .role-label{display:flex;flex-direction:column;align-items:center;gap:0.4rem;padding:1rem 0.75rem;border:1.5px solid var(--border-color);border-radius:14px;cursor:pointer;transition:all 0.25s;background:rgba(255,255,255,0.03);text-align:center;}
        .role-label:hover{border-color:rgba(99,102,241,0.4);background:rgba(99,102,241,0.06);}
        .role-option input:checked + .role-label{border-color:var(--primary-color);background:rgba(99,102,241,0.12);box-shadow:0 0 0 3px rgba(99,102,241,0.2);}
        .role-icon{font-size:1.75rem;}
        .role-name{font-weight:700;font-size:0.88rem;}
        .role-desc{font-size:0.72rem;color:var(--text-muted);line-height:1.4;}

        .btn-register-submit{background:linear-gradient(135deg,var(--primary-color) 0%,#4f46e5 100%);border:none;color:white;border-radius:12px;font-weight:700;padding:0.85rem 1.2rem;transition:all 0.3s;width:100%;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:0.5rem;}
        .btn-register-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(99,102,241,0.6);}
        .btn-register-submit:disabled{opacity:0.6;cursor:not-allowed;}
        .divider{border:none;border-top:1px solid var(--border-color);margin:1.5rem 0;}
        .back-link{text-align:center;font-size:0.83rem;color:var(--text-muted);}
        .back-link a{color:#a5b4fc;text-decoration:none;font-weight:600;}
        .back-link a:hover{text-decoration:underline;}

        /* Success card shown after registration */
        .success-card{display:none;text-align:center;padding:0.5rem 0;}
        .success-card .user-id-badge{display:inline-block;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#86efac;padding:0.4rem 1.2rem;border-radius:100px;font-size:1.1rem;font-weight:800;letter-spacing:0.05em;margin:0.75rem 0;}
        .success-card p{font-size:0.83rem;color:var(--text-muted);}

        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
        #toast-container{position:fixed;bottom:2rem;right:2rem;z-index:9999;display:flex;flex-direction:column;gap:0.75rem;}
        .toast-msg{padding:0.85rem 1.25rem;border-radius:12px;font-size:0.88rem;font-weight:500;color:#fff;backdrop-filter:blur(12px);animation:slideIn 0.3s ease;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
        .toast-msg.success{background:rgba(34,197,94,0.85);border:1px solid rgba(34,197,94,0.4);}
        .toast-msg.error{background:rgba(239,68,68,0.85);border:1px solid rgba(239,68,68,0.4);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1">⚡ AI Dataset Manager</span>
        <a href="dashboard.html" class="btn-back">← Dashboard</a>
    </div>
</nav>

<div class="register-wrap">
    <div class="register-card">
        <div id="form-section">
            <div class="register-icon">👤</div>
            <div class="register-title">Register User</div>
            <div class="register-subtitle">Choose your role — it determines what you can see and do.</div>

            <!-- Role Selector -->
            <div class="form-label mb-2">Select Role</div>
            <div class="role-selector">
                <div class="role-option">
                    <input type="radio" id="role-lead" name="role" value="lead">
                    <label class="role-label" for="role-lead">
                        <span class="role-icon">🔑</span>
                        <span class="role-name">Team Lead</span>
                        <span class="role-desc">Create datasets, assign to developers, view all data</span>
                    </label>
                </div>
                <div class="role-option">
                    <input type="radio" id="role-dev" name="role" value="developer" checked>
                    <label class="role-label" for="role-dev">
                        <span class="role-icon">💻</span>
                        <span class="role-name">Developer</span>
                        <span class="role-desc">Access assigned datasets, upload versions, log changes</span>
                    </label>
                </div>
            </div>

            <label class="form-label">Full Name</label>
            <input id="name" class="form-control mb-3" placeholder="e.g. Yash Jha" autocomplete="name">

            <label class="form-label">Email Address</label>
            <input id="email" class="form-control mb-4" type="email" placeholder="e.g. yash@example.com" autocomplete="email">

            <button id="register-btn" onclick="register()" class="btn-register-submit">
                <span id="register-text">Create Account</span>
            </button>

            <hr class="divider">
            <div class="back-link">Already registered? <a href="dashboard.html">Go to Dashboard →</a></div>
        </div>

        <!-- Success state shown after registration -->
        <div class="success-card" id="success-section">
            <div style="font-size:3rem;margin-bottom:0.5rem;">🎉</div>
            <div style="font-weight:800;font-size:1.25rem;margin-bottom:0.25rem;">Account Created!</div>
            <p id="success-name" style="color:var(--text-muted);margin-bottom:0.75rem;"></p>
            <p style="font-size:0.8rem;color:var(--text-muted);">Your User ID (save this — you'll need it to log in):</p>
            <div class="user-id-badge" id="success-user-id">—</div>
            <p id="success-role-msg" style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem;"></p>
            <a href="dataset.html" style="display:inline-block;margin-top:1.25rem;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-radius:12px;padding:0.8rem 1.5rem;font-weight:700;font-size:0.9rem;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">Go to Datasets →</a>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script>
    function showToast(message, type='info') {
        const c=document.getElementById('toast-container');
        const t=document.createElement('div');
        t.className=`toast-msg ${type}`;t.textContent=message;c.appendChild(t);
        setTimeout(()=>{t.style.cssText='opacity:0;transform:translateX(30px);transition:all 0.3s;';setTimeout(()=>t.remove(),300);},4000);
    }

    async function register() {
        const name  = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const role  = document.querySelector('input[name="role"]:checked').value;
        if (!name || !email) { showToast('Please enter both a name and an email.', 'error'); return; }

        const btn=document.getElementById('register-btn');
        const txt=document.getElementById('register-text');
        btn.disabled=true;
        txt.innerHTML='<span class="spinner"></span> Registering...';

        try {
            const res    = await fetch('/users/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, email, role}) });
            const result = await res.json();
            if (res.ok) {
                // Show success card with the User ID
                document.getElementById('form-section').style.display = 'none';
                const sc = document.getElementById('success-section');
                sc.style.display = 'block';
                document.getElementById('success-user-id').textContent  = `ID: ${result.user_id}`;
                document.getElementById('success-name').textContent      = `Welcome, ${name}!`;
                document.getElementById('success-role-msg').textContent  =
                    role === 'lead'
                    ? '🔑 You are a Team Lead — you can create datasets and assign them to developers.'
                    : '💻 You are a Developer — ask your Team Lead to assign datasets to your User ID.';
            } else {
                showToast('❌ ' + (result.error || 'Registration failed.'), 'error');
                btn.disabled=false;
                txt.innerHTML='Create Account';
            }
        } catch {
            showToast('Network error — is the server running?', 'error');
            btn.disabled=false;
            txt.innerHTML='Create Account';
        }
    }

    document.addEventListener('keydown', e => { if (e.key==='Enter') register(); });
</script>
</body>
</html>
