<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register | AI Dataset Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">AI Dataset Manager</span>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm mt-5">
                    <div class="card-header bg-dark text-white">Register New User</div>
                    <div class="card-body">
                        <input id="name" class="form-control mb-3" placeholder="Full Name">
                        <input id="email" class="form-control mb-3" type="email" placeholder="Email Address">
                        <button onclick="register()" class="btn btn-dark w-100">Register</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function register() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;

        // Basic check to make sure fields aren't empty
        if (!name || !email) {
            alert("Please enter both a name and an email.");
            return;
        }

        try {
            const response = await fetch("/users/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email })
            });

            // Parse the JSON response from Flask
            const result = await response.json();

            if (response.ok) {
                alert("Success: User Registered!");
                window.location.href = "/";
            } else {
                // If Flask sends back a 409 or 500 error, show the exact message
                alert("Error: " + result.error);
            }
        } catch (error) {
            alert("Network error: Make sure your Flask server is running.");
        }
    }
</script>
</body>
</html>
